apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-cart-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devops-cart-app
  template:
    metadata:
      labels:
        app: devops-cart-app
    spec:
      containers:
        - name: devops-cart-app
          image: kailashbadu/devops-cart-app
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
